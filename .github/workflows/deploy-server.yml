name: deploy-server

# Build the FastAPI backend Docker image, push to GHCR, then point the
# Container App at the new tag. See docs/azure-web-deployment.md M4 for the
# one-time Azure OIDC setup that powers azure/login@v2.

on:
  push:
    branches: [main]
    paths:
      - "tradingagents/**"
      - "cli/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write    # for GHCR push
  id-token: write    # for Azure OIDC federated login

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tradingagents-server
  AZURE_RESOURCE_GROUP: tradingagents-prod-rg
  AZURE_CONTAINER_APP_NAME: tradingagents-prod-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[server]'
          pip install pytest
      - name: Run tests
        # tests/conftest.py injects placeholder API keys, so no real
        # credentials are needed for the suite to pass.
        run: pytest tests/ -q --ignore=tests/test_deepseek_reasoning.py

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      # Optional: a GitHub Environment lets you require manual approval
      # before deploys. Create one named "azure-prod" in repo settings to
      # gate this step; otherwise it deploys automatically.
      name: azure-prod
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App revision
        run: |
          az containerapp update \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${IMAGE_NAME}:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Show new revision
        run: |
          az containerapp revision list \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "[0].{name:name, active:properties.active, image:properties.template.containers[0].image, createdTime:properties.createdTime}" \
            -o table
